<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.grid { display: grid; grid-template-columns: repeat(5, 1fr) repeat(4, 1fr); gap: 10px; }
.grid { grid-template-columns: repeat(5, 1fr); }
.sys-dot { width: 100%; aspect-ratio: 1/1; border-radius: 50%; box-shadow: 0 0 16px currentColor; }
</style></head>

  </div>
</div></body></html>
