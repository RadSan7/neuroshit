<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.r { background: rgba(10,15,28,0.6); border: 1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; height: 70px; }
.r .num { font-family: var(--font-mono); font-size:11px; color: var(--accent-secondary); }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Corner radii</div>
  <div class="grid">
    <div class="swatch"><div class="r" style="border-radius:6px"><span class="num">6px</span></div><span class="name">--r-sm</span></div>
    <div class="swatch"><div class="r" style="border-radius:10px"><span class="num">10px</span></div><span class="name">--r-md</span></div>
    <div class="swatch"><div class="r" style="border-radius:12px"><span class="num">12px</span></div><span class="name">--r-lg</span></div>
    <div class="swatch"><div class="r" style="border-radius:16px"><span class="num">16px</span></div><span class="name">--r-xl</span></div>
    <div class="swatch"><div class="r" style="border-radius:9999px"><span class="num">pill</span></div><span class="name">--r-pill</span></div>
  </div>
</div></body></html>
