<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.title-row { display:flex; justify-content:space-between; align-items:center; }
.stack {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 6px;
}
.chip {
  position: relative;
  aspect-ratio: 1/1;
  overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  border: 1px solid rgba(74,222,128,0.2);
}
.chip::before, .chip::after {
  content:""; position:absolute; width:7px; height:7px;
  border: solid #4ade80; border-width:0;
  z-index:3;
}
.chip::before { top:-1px; left:-1px; border-top-width:1px; border-left-width:1px; }
.chip::after  { bottom:-1px; right:-1px; border-bottom-width:1px; border-right-width:1px; }
.chip .fill { position:absolute; inset:0; }
.chip .grid-ovl {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(74,222,128,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,222,128,0.08) 1px, transparent 1px);
  background-size: 16px 16px;
  opacity: 0.6;
}
.chip .scan {
  position:absolute; inset:0; pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.22) 2px 3px);
  mix-blend-mode: multiply;
}
.chip .tag {
  position:absolute; top:6px; left:8px;
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.14em;
  color: #4ade80; text-transform: uppercase;
  padding: 1px 5px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(74,222,128,0.25);
  z-index: 2;
}
.chip .hex {
  position:absolute; bottom:6px; left:8px;
  font-family: var(--font-mono); font-size: 9px; color:#cbd5e1;
  letter-spacing: 0.08em;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  z-index: 2;
}
.chip .alpha {
  position:absolute; bottom:6px; right:8px;
  font-family: var(--font-mono); font-size: 8px; color:#94a3b8;
  letter-spacing: 0.08em;
  z-index: 2;
}

.row-caption {
  font-family: var(--font-mono); font-size: 9px; color: #64748b;
  letter-spacing: 0.14em; text-transform:uppercase;
  display:flex; gap: 10px; align-items:center;
}
.row-caption .sep { flex:1; height: 1px; background: repeating-linear-gradient(90deg, rgba(74,222,128,0.25) 0 4px, transparent 4px 8px); }

.name {
  margin-top: 6px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  color: #e2e8f0; letter-spacing: 0.04em;
}
.sub { font-family: var(--font-mono); font-size: 9px; color: #64748b; letter-spacing: 0.06em; }
</style></head>
<body style="background:#040812"><div class="card-pad">
  <div class="title-row">
    <div class="label-tiny">Surfaces — dark glass stack · 4 layer depth</div>
    <div class="row-caption"><span>LAYER_MAP</span><span class="sep"></span><span>L0 → L3</span></div>
  </div>

  <div class="stack">
    <div>
      <div class="chip">
        <div class="fill" style="background:#040812"></div>
        <span class="tag">L0 · VOID</span>
        <span class="hex">#040812</span>
        <span class="alpha">α 1.00</span>
      </div>
      <div class="name">--bg-base</div>
      <div class="sub">page / body</div>
    </div>

    <div>
      <div class="chip">
        <div class="fill" style="background:linear-gradient(180deg,#06101d 0%, #07111d 50%, #040812 100%)"></div>
        <div class="grid-ovl"></div>
        <span class="tag">L1 · CANVAS</span>
        <span class="hex">#06101D</span>
        <span class="alpha">α 1.00</span>
      </div>
      <div class="name">--bg-1</div>
      <div class="sub">canvas gradient</div>
    </div>

    <div>
      <div class="chip">
        <div class="fill" style="background:#040812"></div>
        <div class="fill" style="background:linear-gradient(180deg, rgba(12,17,33,0.78), rgba(6,16,29,0.78)); backdrop-filter:blur(20px); border-top:1px solid rgba(74,222,128,0.25)"></div>
        <div class="scan"></div>
        <span class="tag">L2 · GLASS</span>
        <span class="hex">rgba(12,17,33)</span>
        <span class="alpha">α 0.78</span>
      </div>
      <div class="name">--panel-bg</div>
      <div class="sub">toolbar · dropdown · legend</div>
    </div>

    <div>
      <div class="chip">
        <div class="fill" style="background:#040812"></div>
        <div class="fill" style="background:linear-gradient(180deg, rgba(10,15,28,0.88), rgba(4,8,18,0.88)); backdrop-filter:blur(28px); border-top:1px solid rgba(74,222,128,0.3)"></div>
        <div class="scan"></div>
        <span class="tag">L3 · DOSSIER</span>
        <span class="hex">rgba(10,15,28)</span>
        <span class="alpha">α 0.88</span>
      </div>
      <div class="name">--info-panel</div>
      <div class="sub">info-panel · modal</div>
    </div>
  </div>
</div></body></html>
