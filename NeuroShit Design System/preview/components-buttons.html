<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.row { display: flex; gap: 8px; align-items: center; flex-wrap:wrap; }

/* Primary button — hard edges, hairline border, micro clip-path corners */
.btn {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-radius: 2px;
  padding: 8px 14px;
  border: 1px solid rgba(74,222,128,0.35);
  background: rgba(10,17,28,0.7);
  color: #cbd5e1;
  cursor: pointer;
  transition: all 0.12s linear;
  display:inline-flex;
  align-items:center;
  gap:8px;
  position: relative;
  clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
}
.btn::before {
  content: "▸";
  color: #4ade80;
  font-size: 10px;
  opacity: 0.7;
}
.btn:hover {
  background: rgba(74,222,128,0.08);
  border-color: #4ade80;
  color: #4ade80;
  box-shadow: 0 0 0 1px rgba(74,222,128,0.25), inset 0 0 12px rgba(74,222,128,0.08);
}
.btn.active {
  background: rgba(74,222,128,0.12);
  border-color: #4ade80;
  color: #4ade80;
}

/* Icon button — pure square, no radius */
.btn-icon {
  width: 30px;
  height: 30px;
  border-radius: 0;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: #cbd5e1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size: 14px;
  font-family: var(--font-mono);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.1s linear;
}
.btn-icon:hover {
  background: rgba(74,222,128,0.1);
  border-color: #4ade80;
  color: #4ade80;
}

/* Control group — hard rectangular cluster with bracket corners */
.ctrl-group {
  display:inline-flex;
  gap:0;
  background: rgba(0,0,0,0.4);
  padding: 3px;
  border-radius: 0;
  border: 1px solid rgba(255,255,255,0.08);
  align-items:center;
  position: relative;
}
.ctrl-group::before, .ctrl-group::after {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  border-color: #4ade80;
  border-style: solid;
  border-width: 0;
}
.ctrl-group::before { top: -2px; left: -2px; border-top-width: 1px; border-left-width: 1px; }
.ctrl-group::after { bottom: -2px; right: -2px; border-bottom-width: 1px; border-right-width: 1px; }
.ctrl-group .btn-icon { border: none; }
.ctrl-group .btn-icon:hover { background: rgba(74,222,128,0.15); }
.ctrl-group .zoom {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #4ade80;
  min-width: 52px;
  text-align:center;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 0 6px;
}

/* Close — sharp diamond-ish with warning accent */
.close {
  width: 30px;
  height: 30px;
  border-radius: 0;
  border: 1px solid rgba(248,113,113,0.4);
  background: rgba(248,113,113,0.06);
  color: #f87171;
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 500;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor: pointer;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  transition: all 0.1s linear;
}
.close:hover {
  background: rgba(248,113,113,0.15);
  color: #fca5a5;
  box-shadow: 0 0 12px rgba(248,113,113,0.3);
}

/* Danger / exec variant */
.btn-exec {
  border-color: rgba(34,211,238,0.4);
  color: #22d3ee;
}
.btn-exec::before { content: "$"; color: #22d3ee; }
.btn-exec:hover {
  background: rgba(34,211,238,0.08);
  border-color: #22d3ee;
  color: #22d3ee;
  box-shadow: 0 0 0 1px rgba(34,211,238,0.25);
}

.meta {
  font-size: 10px;
  color: #64748b;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.meta .k { color: #4ade80; }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Buttons — terminal / bracket / icon cluster</div>
  <div class="row">
    <button class="btn">Systemy</button>
    <button class="btn active">Interakcje</button>
    <button class="btn btn-exec">Exec</button>
  </div>
  <div class="row" style="margin-top:2px">
    <div class="ctrl-group">
      <button class="btn-icon">−</button>
      <span class="zoom">1.00×</span>
      <button class="btn-icon">+</button>
      <button class="btn-icon">⌂</button>
    </div>
    <button class="close">×</button>
  </div>
  <div class="row" style="margin-top:4px">
    <span class="meta">radius <span class="k">2px</span> · clip-path corner <span class="k">6px</span> · mono caps · hairline 1px</span>
  </div>
</div></body></html>
