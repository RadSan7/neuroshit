<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.tooltip { background: rgba(12,17,33,0.9); backdrop-filter: blur(16px); border: 1px solid rgba(45,212,191,0.15); border-radius: 12px; padding: 12px 16px; max-width: 320px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
.tt-type { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; color:#c084fc; }
.tt-title { font-weight:700; font-size:15px; margin-bottom:6px; background: linear-gradient(to right, #fff, #cbd5e1); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.tt-desc { font-size:13px; color:#94a3b8; line-height:1.5; }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Tooltip — hover card</div>
  <div style="display:flex; gap:14px; flex-wrap:wrap">
    <div class="tooltip" style="flex:1; min-width:240px">
      <div class="tt-type">Receptor</div>
      <div class="tt-title">D₂ · Dopamine D2</div>
      <div class="tt-desc">D2-like (Gi/Go). ↓cAMP. Target of antipsychotics. Presynaptic autoreceptor.</div>
    </div>
    <div class="tooltip" style="flex:1; min-width:240px">
      <div class="tt-type" style="color:#60a5fa">Synthetic enzyme</div>
      <div class="tt-title">TH · Tyrosine hydroxylase</div>
      <div class="tt-desc">Rate-limiting step of catecholamine synthesis. Cofactors: BH4, Fe²⁺, O₂.</div>
    </div>
  </div>
</div></body></html>
