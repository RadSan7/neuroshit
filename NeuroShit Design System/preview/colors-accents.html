<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.swatch .chip.g1 { background: linear-gradient(135deg, #4ade80, #22d3ee); }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Neon accents — primary identity</div>
  <div class="swatches">
    <div class="swatch"><div class="chip" style="background:#4ade80"></div><span class="name">--accent</span><span>#4ADE80</span></div>
    <div class="swatch"><div class="chip" style="background:#22d3ee"></div><span class="name">--accent-secondary</span><span>#22D3EE</span></div>
    <div class="swatch"><div class="chip g1"></div><span class="name">brand gradient</span><span>135° linear</span></div>
    <div class="swatch"><div class="chip" style="background:rgba(74,222,128,0.4); box-shadow:0 0 24px rgba(74,222,128,0.6)"></div><span class="name">--accent-glow</span><span>rgba .40</span></div>
    <div class="swatch"><div class="chip" style="background:rgba(34,211,238,0.4); box-shadow:0 0 24px rgba(34,211,238,0.6)"></div><span class="name">--cyan-glow</span><span>rgba .40</span></div>
  </div>
</div></body></html>
