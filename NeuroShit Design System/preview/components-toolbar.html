<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.bar { display:flex; align-items:center; gap:16px; padding: 0 20px; height: 56px; background: rgba(12,17,33,0.75); backdrop-filter: blur(20px); border: 1px solid rgba(45,212,191,0.15); border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
.brand { font-size:22px; font-weight:800; letter-spacing:-0.5px; background: linear-gradient(135deg, #4ade80, #22d3ee); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-shadow: 0 0 20px rgba(74,222,128,0.4); }
.sub { font-size:12px; font-weight:500; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; padding-left:8px; border-left:1px solid rgba(255,255,255,0.1); }
.spacer { margin-left:auto; }
.btn { font-size:13px; font-weight:600; border-radius:10px; padding:8px 16px; border:1px solid rgba(255,255,255,0.08); background: rgba(30,41,59,0.6); color:#f1f5f9; }
.ctrl { display:inline-flex; gap:6px; background: rgba(0,0,0,0.2); padding:4px; border-radius:12px; border:1px solid rgba(255,255,255,0.05); align-items:center; }
.ibtn { width:36px; height:36px; border-radius:8px; background:transparent; border:none; color:#f1f5f9; font-size:18px; font-weight:300; }
.zoom { font-family:"Fira Code", monospace; font-size:12px; color:#22d3ee; min-width:48px; text-align:center; font-weight:600; }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Toolbar — brand + controls</div>
  <div class="bar">
    <div class="brand">NeuroShit</div>
    <div class="sub">Neuro · Atlas Biochemiczny</div>
    <div class="spacer"></div>
    <button class="btn">Systemy</button>
    <button class="btn">Interakcje</button>
    <div class="ctrl">
      <button class="ibtn">−</button>
      <span class="zoom">100%</span>
      <button class="ibtn">+</button>
      <button class="ibtn">⌂</button>
    </div>
  </div>
</div></body></html>
