<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.panel {
  background: linear-gradient(180deg, rgba(6,16,29,0.96), rgba(4,8,18,0.96));
  backdrop-filter: blur(24px);
  border: 1px solid rgba(74,222,128,0.28);
  border-radius: 2px;
  padding: 0;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 12px 40px rgba(0,0,0,0.6), inset 0 0 40px rgba(74,222,128,0.04);
  width: 320px;
  font-family: var(--font-mono);
  position: relative;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}
/* bracket corners */
.panel::before, .panel::after {
  content: "";
  position: absolute;
  width: 8px; height: 8px;
  border-color: #4ade80;
  border-style: solid;
  border-width: 0;
  pointer-events: none;
}
.panel::before { top: -1px; left: -1px; border-top-width: 1px; border-left-width: 1px; }
.panel::after { bottom: -1px; right: -1px; border-bottom-width: 1px; border-right-width: 1px; }

.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px dashed rgba(74,222,128,0.18);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: #4ade80;
  text-transform: uppercase;
  background: rgba(74,222,128,0.04);
}
.hd .sid { color: #64748b; }
.hd .dot-blink {
  width: 6px; height: 6px; border-radius:50%;
  background: #4ade80;
  box-shadow: 0 0 8px #4ade80;
  animation: blink 1.2s steps(2) infinite;
  display:inline-block;
  margin-right: 6px;
}
@keyframes blink { 50% { opacity: 0.25; } }

.cmdline {
  padding: 6px 12px;
  font-size: 11px;
  color: #cbd5e1;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; gap: 6px;
}
.cmdline .prompt { color: #4ade80; }
.cmdline .cur {
  display:inline-block; width: 6px; height: 12px; background: #4ade80;
  animation: cur 0.9s steps(2) infinite;
}
@keyframes cur { 50% { opacity: 0; } }

.list { padding: 4px; }
.cb-row {
  display: grid;
  grid-template-columns: 14px 14px auto 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 0;
  transition: background 0.08s linear;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  position: relative;
  color: #cbd5e1;
  letter-spacing: 0.02em;
}
.cb-row:hover { background: rgba(74,222,128,0.06); }
.cb-row:hover::before {
  content: "▸";
  position: absolute;
  left: -2px; top: 50%; transform: translateY(-50%);
  color: #4ade80; font-size: 9px;
}

/* pseudo-checkbox — ASCII bracket */
.cb {
  appearance: none;
  width: 14px; height: 14px;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 0;
  background: rgba(0,0,0,0.4);
  cursor: pointer;
  position: relative;
  transition: border-color 0.1s;
  font-family: var(--font-mono);
}
.cb:hover { border-color: rgba(74,222,128,0.5); }
.cb:checked { background: rgba(74,222,128,0.15); border-color: #4ade80; box-shadow: inset 0 0 6px rgba(74,222,128,0.3); }
.cb:checked::after {
  content: "×";
  position: absolute;
  color: #4ade80;
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  top: -2px; left: 2px;
  text-shadow: 0 0 4px #4ade80;
}

.sys-dot { width: 8px; height: 8px; border-radius: 0; transform: rotate(45deg); box-shadow: 0 0 8px currentColor; }

.sys-code { color: #64748b; font-size: 10px; letter-spacing: 0.08em; }
.sys-name { color: #e2e8f0; font-weight: 500; }
.cb-row.checked .sys-name { color: #4ade80; }

.cnt {
  font-size: 9px;
  color: #64748b;
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
  padding: 1px 4px;
  border: 1px solid rgba(255,255,255,0.08);
}
.cb-row.checked .cnt { color: #4ade80; border-color: rgba(74,222,128,0.3); }

.ft {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 12px;
  border-top: 1px dashed rgba(74,222,128,0.15);
  font-size: 9px;
  color: #64748b;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(0,0,0,0.25);
}
.ft .hz { color: #facc15; }
.ft .ctrl { display: flex; gap: 8px; }
.ft .ctrl span { cursor: pointer; }
.ft .ctrl span:hover { color: #4ade80; }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Filter dropdown — active system mask</div>
  <div class="panel">
    <div class="hd">
      <span><span class="dot-blink"></span>SYS.MASK &nbsp;·&nbsp; 7/9 ACTIVE</span>
      <span class="sid">[0xA4F2]</span>
    </div>
    <div class="cmdline">
      <span class="prompt">root@atlas:~#</span>
      <span>./filter --toggle</span>
      <span class="cur"></span>
    </div>
    <div class="list">
      <label class="cb-row checked"><input class="cb" type="checkbox" checked><span class="sys-dot" style="background:#4ade80; color:#4ade80"></span><span class="sys-code">DA</span><span class="sys-name">dopamina</span><span class="cnt">N:32</span></label>
      <label class="cb-row checked"><input class="cb" type="checkbox" checked><span class="sys-dot" style="background:#a78bfa; color:#a78bfa"></span><span class="sys-code">5HT</span><span class="sys-name">serotonina</span><span class="cnt">N:28</span></label>
      <label class="cb-row checked"><input class="cb" type="checkbox" checked><span class="sys-dot" style="background:#fb923c; color:#fb923c"></span><span class="sys-code">NE</span><span class="sys-name">noradrenalina</span><span class="cnt">N:19</span></label>
      <label class="cb-row"><input class="cb" type="checkbox"><span class="sys-dot" style="background:#22d3ee; color:#22d3ee"></span><span class="sys-code">GABA</span><span class="sys-name">GABA</span><span class="cnt">N:24</span></label>
      <label class="cb-row"><input class="cb" type="checkbox"><span class="sys-dot" style="background:#f87171; color:#f87171"></span><span class="sys-code">GLU</span><span class="sys-name">glutaminian</span><span class="cnt">N:21</span></label>
      <label class="cb-row checked"><input class="cb" type="checkbox" checked><span class="sys-dot" style="background:#34d399; color:#34d399"></span><span class="sys-code">ACh</span><span class="sys-name">acetylocholina</span><span class="cnt">N:17</span></label>
      <label class="cb-row checked"><input class="cb" type="checkbox" checked><span class="sys-dot" style="background:#ec4899; color:#ec4899"></span><span class="sys-code">OP</span><span class="sys-name">opioidy</span><span class="cnt">N:12</span></label>
    </div>
    <div class="ft">
      <span><span class="hz">⚠</span> &nbsp;INTERNAL // CLASSIFIED</span>
      <span class="ctrl"><span>[A]ll</span><span>[N]one</span><span>[↵]apply</span></span>
    </div>
  </div>
</div></body></html>
