<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
.shapes { display:flex; gap:32px; align-items:center; justify-content:space-around; flex: 1; }
.sh-item { display:flex; flex-direction:column; align-items:center; gap:8px; }
.sh-big { width:56px; height:56px; }
.sh-hex { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
.sh-dia { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
.sh-circ { border-radius:50%; }
.sh-pill { width:90px; height:36px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#000; }
.lbl { font-size:11px; color:#94a3b8; font-weight:600; }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Node shapes — geometric vocabulary</div>
  <div class="shapes">
    <div class="sh-item"><div class="sh-big sh-circ" style="background:#4ade80; box-shadow:0 0 16px #4ade80"></div><span class="lbl">neurotransm.</span></div>
    <div class="sh-item"><div class="sh-pill" style="background:#60a5fa; box-shadow:0 0 14px rgba(96,165,250,0.5)">TH</div><span class="lbl">enzyme</span></div>
    <div class="sh-item"><div class="sh-big sh-hex" style="background:#c084fc; box-shadow:0 0 16px #c084fc"></div><span class="lbl">receptor</span></div>
    <div class="sh-item"><div class="sh-big sh-dia" style="background:#22d3ee; box-shadow:0 0 16px #22d3ee"></div><span class="lbl">transporter</span></div>
    <div class="sh-item"><div class="sh-circ" style="width:40px;height:40px;background:#f59e0b; box-shadow:0 0 12px #f59e0b"></div><span class="lbl">precursor</span></div>
    <div class="sh-item"><div class="sh-circ" style="width:26px;height:26px;background:#94a3b8"></div><span class="lbl">metabolite</span></div>
  </div>
</div></body></html>
