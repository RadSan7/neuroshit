<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
  .wrap { padding: 24px 28px; display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; align-items:center; gap: 18px; }

  /* Mark: dissecting cross — synapse cleft + axon terminal, with a glitch slice */
  .mark {
    position: relative; width: 64px; height: 64px;
    background:
      radial-gradient(circle at 30% 30%, rgba(74,222,128,0.25), transparent 60%),
      #05050f;
    border: 1px solid rgba(74,222,128,0.5);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.6) inset,
      0 0 24px rgba(74,222,128,0.35),
      inset 0 0 40px rgba(34,211,238,0.08);
    overflow: hidden;
    clip-path: polygon(0 0, 100% 0, 100% 62%, 94% 66%, 100% 70%, 100% 100%, 0 100%);
  }
  .mark::before {
    /* scanline */
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(74,222,128,0.06) 2px 3px);
    pointer-events:none;
  }
  .mark::after {
    /* cleft slash — the visual cut */
    content:''; position:absolute; left:-6px; right:-6px; top:62%; height:2px;
    background: linear-gradient(90deg, transparent, #4ade80 20%, #22d3ee 80%, transparent);
    box-shadow: 0 0 14px #4ade80, 0 0 30px rgba(34,211,238,0.6);
    transform: rotate(-4deg);
  }
  .mark svg { position:absolute; inset:6px; width: calc(100% - 12px); height: calc(100% - 12px); }

  /* Wordmark with the ugly honest name, edge-cut */
  .word { position:relative; font-size: 48px; font-weight: 800; letter-spacing: -0.04em; line-height: 0.95; }
  .word .a {
    background: linear-gradient(180deg, #f1f5f9 0%, #f1f5f9 60%, #4ade80 60%, #4ade80 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(2px 0 0 rgba(248,113,113,0.4)) drop-shadow(-2px 0 0 rgba(34,211,238,0.4));
  }
  .word .shit {
    color: #4ade80;
    text-shadow: 0 0 22px rgba(74,222,128,0.55), 0 0 2px rgba(74,222,128,1);
    font-style: italic;
  }
  .word::after {
    /* horizontal tear through the logotype */
    content:''; position:absolute; left:-4px; right:-4px; top:58%; height:4px;
    background: #05050f;
    border-top: 1px solid rgba(248,113,113,0.5);
    border-bottom: 1px solid rgba(34,211,238,0.5);
  }

  .sub { font-size:10px; color:#4ade80; text-transform:uppercase; letter-spacing: 0.32em; font-weight:600; font-family:'Fira Code',monospace; margin-top: 10px; display:flex; align-items:center; gap:8px; }
  .sub::before { content:''; width: 14px; height: 1px; background:#4ade80; box-shadow: 0 0 6px #4ade80; }
  .meta { font-size:9px; color:#64748b; font-family:'Fira Code',monospace; letter-spacing: 0.12em; }

  /* horizontal variant */
  .mono {
    border: 1px solid rgba(255,255,255,0.08); background: rgba(15,15,35,0.6); border-radius: 8px;
    padding: 10px 14px; display:flex; align-items:center; gap:10px;
  }
  .mono .dot { width:8px; height:8px; border-radius:50%; background:#4ade80; box-shadow: 0 0 10px #4ade80; }
  .mono .t { font-size: 14px; font-weight:800; letter-spacing:-0.02em; color:#f1f5f9; }
  .mono .t em { color:#4ade80; font-style:italic; font-weight:800; }
  .mono .v { font-family:'Fira Code',monospace; font-size:10px; color:#64748b; margin-left:auto; }
</style></head>
<body><div class="card-pad">
  <div class="label-tiny">Wordmark · Mark · System lockup</div>
  <div class="wrap">
    <div class="row">
      <div class="mark">
        <svg viewBox="0 0 64 64" fill="none">
          <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#22d3ee"/>
          </linearGradient></defs>
          <!-- pre-synaptic terminal (upper) -->
          <circle cx="22" cy="18" r="7" fill="url(#lg)" opacity="0.95"/>
          <circle cx="22" cy="18" r="2" fill="#05050f"/>
          <circle cx="19" cy="14" r="1.2" fill="#05050f"/>
          <circle cx="25" cy="16" r="1" fill="#05050f"/>
          <!-- axon -->
          <path d="M22 25 L22 36" stroke="url(#lg)" stroke-width="2.5"/>
          <!-- vesicles crossing cleft -->
          <circle cx="22" cy="40" r="1.3" fill="#4ade80"/>
          <circle cx="27" cy="42" r="1" fill="#22d3ee"/>
          <circle cx="17" cy="43" r="1" fill="#c084fc"/>
          <!-- post-synaptic receptor array -->
          <rect x="8" y="48" width="48" height="4" rx="2" fill="url(#lg)" opacity="0.45"/>
          <rect x="10" y="46" width="3" height="8" rx="1" fill="url(#lg)"/>
          <rect x="18" y="46" width="3" height="8" rx="1" fill="url(#lg)"/>
          <rect x="26" y="46" width="3" height="8" rx="1" fill="url(#lg)"/>
          <rect x="34" y="46" width="3" height="8" rx="1" fill="url(#lg)"/>
          <rect x="42" y="46" width="3" height="8" rx="1" fill="url(#lg)"/>
          <rect x="50" y="46" width="3" height="8" rx="1" fill="url(#lg)"/>
        </svg>
      </div>
      <div>
        <div class="word"><span class="a">Neuro</span><span class="shit">Shit</span></div>
        <div class="sub">Atlas · Biochemiczny <span class="meta">v0.7 // RC</span></div>
      </div>
    </div>

    <div class="mono">
      <span class="dot"></span>
      <span class="t">Neuro<em>Shit</em></span>
      <span class="v">// 064.7a</span>
    </div>
  </div>
</div></body></html>
